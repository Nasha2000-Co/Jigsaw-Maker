<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Headbreaker 3×3 — shape test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #e8e4df;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      color: #1a1a1a;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.2em;
      margin-bottom: 6px;
    }
    p {
      font-size: 13px;
      color: #555;
      margin-bottom: 18px;
      text-align: center;
      max-width: 420px;
      line-height: 1.45;
    }
    .board-shell {
      background: #fff;
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    }
    #puzzle {
      width: 300px;
      height: 400px;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>HEADBREAKER TEST</h1>
  <p>3×3 assembled puzzle — smooth rounded tabs, solid white outlines, opaque photo fill. Compare to Royal Garden reference.</p>
  <div class="board-shell">
    <div id="puzzle"></div>
  </div>
  <p class="note">No shuffle · Rounded outline · 300×400 · headbreaker v3</p>

  <script src="vendor/konva.min.js"></script>
  <script src="vendor/headbreaker.js"></script>
  <script>
    const PUZZLE_W = 300;
    const PUZZLE_H = 400;
    const COLS = 3;
    const ROWS = 3;

    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = 'assets/jm-bg.png';

    img.onload = () => {
      // Crop source to 3:4 center cover, same as main app
      const crop = document.createElement('canvas');
      crop.width = PUZZLE_W;
      crop.height = PUZZLE_H;
      const cctx = crop.getContext('2d');
      const dstAspect = PUZZLE_W / PUZZLE_H;
      const srcAspect = img.width / img.height;
      let sw, sh, sx, sy;
      if (srcAspect > dstAspect) {
        sh = img.height;
        sw = sh * dstAspect;
        sx = (img.width - sw) / 2;
        sy = 0;
      } else {
        sw = img.width;
        sh = sw / dstAspect;
        sx = 0;
        sy = (img.height - sh) / 2;
      }
      cctx.drawImage(img, sx, sy, sw, sh, 0, 0, PUZZLE_W, PUZZLE_H);

      const cropped = new Image();
      cropped.onload = () => {
        const canvas = new headbreaker.Canvas('puzzle', {
          width: PUZZLE_W,
          height: PUZZLE_H,
          pieceSize: headbreaker.vector(PUZZLE_W / COLS, PUZZLE_H / ROWS),
          proximity: 18,
          borderFill: 12,
          strokeWidth: 2,
          strokeColor: 'rgba(255, 255, 255, 0.98)',
          lineSoftness: 0.18,
          image: cropped,
          fixed: true,
          outline: new headbreaker.outline.Rounded(),
          painter: new headbreaker.painters.Konva(),
        });

        canvas.autogenerate({
          horizontalPiecesCount: COLS,
          verticalPiecesCount: ROWS,
        });

        // Assembled board — do NOT shuffle
        canvas.draw();
        window.__hbReady = true;
      };
      cropped.src = crop.toDataURL('image/png');
    };

    img.onerror = () => {
      document.querySelector('.note').textContent = 'Failed to load assets/jm-bg.png';
    };
  </script>
</body>
</html>
