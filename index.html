<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jigsaw Maker</title>
  <!-- Google tag (gtag.js) — anonymous usage metrics only -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EJ22395JR7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-EJ22395JR7', { send_page_view: false });
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
      --glass: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(255, 255, 255, 0.85);
      --black: #1a1a1a;
      --snap: 28px;
      --bg-dim: rgba(0, 0, 0, 0.2);
      --puzzle-card-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--sans);
      color: var(--black);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('assets/jm-bg.png') center/cover no-repeat fixed;
    }

    .bg::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--bg-dim);
      pointer-events: none;
    }

    .sparkles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        radial-gradient(1.5px 1.5px at 15% 25%, rgba(255,230,150,0.9) 50%, transparent 50%),
        radial-gradient(2px 2px at 75% 15%, rgba(255,240,180,0.8) 50%, transparent 50%),
        radial-gradient(1px 1px at 45% 60%, rgba(255,220,120,0.7) 50%, transparent 50%),
        radial-gradient(2px 2px at 85% 70%, rgba(255,235,160,0.85) 50%, transparent 50%),
        radial-gradient(1.5px 1.5px at 25% 85%, rgba(255,210,100,0.75) 50%, transparent 50%),
        radial-gradient(1px 1px at 60% 35%, rgba(255,245,200,0.6) 50%, transparent 50%),
        radial-gradient(2px 2px at 35% 45%, rgba(255,225,140,0.8) 50%, transparent 50%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,235,170,0.7) 50%, transparent 50%);
      animation: shimmer 4s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* Header */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 44px 20px 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: var(--serif);
      font-size: clamp(22px, 5.5vw, 28px);
      font-weight: 500;
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      color: var(--black);
    }

    /* Main content area */
    main {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      flex: 1;
      animation: fadeIn 0.35s ease;
    }

    .screen.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glass card */
    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    /* Upload screen */
    #screen-upload {
      justify-content: flex-start;
      padding-top: 72px;
      text-align: center;
      align-items: center;
    }

    .upload-card-wrap {
      position: relative;
      width: min(300px, calc(100vw - 32px));
      margin-top: 12px;
    }

    .upload-card {
      width: min(300px, calc(100vw - 32px));
      height: min(400px, calc((100vw - 32px) * 4 / 3));
      display: block;
      padding: 22px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255, 255, 255, 0.75);
      border-radius: 18px;
      box-shadow: var(--puzzle-card-shadow);
      cursor: pointer;
      transition: box-shadow 0.2s;
      text-align: center;
    }

    .upload-card:hover {
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.28);
    }

    .upload-dashed {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1.5px dashed rgba(0, 0, 0, 0.18);
      border-radius: 12px;
      position: relative;
      text-align: center;
    }

    .upload-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      text-align: center;
    }

    .upload-card .plus-circle {
      width: 44px;
      height: 44px;
      border: 1.5px solid var(--black);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--sans);
      font-size: 26px;
      font-weight: 300;
      line-height: 1;
      margin-bottom: 4px;
    }

    .upload-card h2 {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      width: 100%;
    }

    .upload-card p {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 400;
      color: #444;
      text-align: center;
      width: 100%;
      line-height: 1.45;
    }

    .upload-card .hint {
      font-size: 12px;
      color: #777;
      text-align: center;
    }

    .upload-preview {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      object-fit: cover;
      width: 100%;
      height: 100%;
      display: none;
    }

    .upload-card.has-image .upload-inner { display: none; }
    .upload-card.has-image .upload-dashed { border-color: transparent; }
    .upload-card.has-image .upload-preview { display: block; }

    #screen-upload .btn-start {
      width: min(300px, calc(100vw - 32px));
      max-width: 100%;
      margin-top: 28px;
      padding: 15px 48px;
      font-size: 20px;
      text-align: center;
      background: #000000;
      color: #ffffff;
    }

    #screen-upload .btn-start:disabled {
      background: #000000;
      color: #ffffff;
      opacity: 0.5;
    }

    .upload-note {
      font-family: var(--sans);
      font-size: 12px;
      color: #fff;
      text-align: center;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
      margin-top: 14px;
      line-height: 1.4;
      width: 100%;
      max-width: min(300px, calc(100vw - 32px));
    }

    #file-input { display: none; }

    /* Buttons */
    .btn {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.05em;
      border: none;
      border-radius: 999px;
      padding: 14px 48px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      margin-top: 20px;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--black);
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: var(--black);
      border: 1.5px solid var(--black);
    }

    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      width: 100%;
      margin-top: 16px;
    }

    #screen-decorate .tool-row {
      margin-bottom: 10px;
    }

    #screen-decorate .decorate-toolbar {
      margin-bottom: 8px;
    }

    #screen-decorate .stroke-color-bar {
      margin-top: 0;
      margin-bottom: 10px;
    }

    #screen-decorate .decorate-canvas-wrap {
      margin-bottom: 10px;
    }

    #screen-decorate .btn-stack {
      gap: 10px;
      margin-top: 8px;
      margin-bottom: 0;
    }

    #screen-decorate .btn-stack .btn {
      margin-top: 0;
      width: min(300px, calc(100vw - 32px));
    }

    /* Play screen */
    .play-toolbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    .btn-back {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.5px solid rgba(0, 0, 0, 0.18);
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--black);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.15s;
    }

    .btn-back:active {
      transform: scale(0.94);
      background: rgba(255, 255, 255, 0.95);
    }

    #screen-play .btn-save-top {
      margin-top: 0;
      padding: 10px 28px;
      font-size: 16px;
      flex-shrink: 0;
    }

    .decorate-toolbar {
      width: 100%;
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    .panel-header {
      display: grid;
      grid-template-columns: 42px 1fr 42px;
      align-items: center;
      width: 100%;
    }

    .panel-header h3 {
      grid-column: 2;
      margin: 0;
      text-align: center;
    }

    .panel-header .btn-back {
      grid-column: 1;
      justify-self: start;
    }

    .grid-hint {
      font-size: 11px;
      color: #666;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .grid-pills {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .grid-pill {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 18px;
      border-radius: 999px;
      border: 1.5px solid var(--black);
      background: rgba(255,255,255,0.6);
      color: var(--black);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .grid-pill.active {
      background: var(--black);
      color: #fff;
    }

    .stroke-color-bar {
      width: 100%;
      max-width: 340px;
      padding: 10px 14px;
      margin-bottom: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stroke-color-label {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .board-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    #board-canvas {
      border-radius: 14px;
      max-width: 100%;
      touch-action: none;
      box-shadow: var(--puzzle-card-shadow);
    }

    .tray-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
      overflow: hidden;
    }

    #tray-canvas {
      border-radius: 12px;
      max-width: 100%;
      touch-action: none;
      border: 1.5px dashed rgba(0,0,0,0.12);
      background: rgba(255, 255, 255, 0.96);
    }

    .play-hint {
      font-size: 11px;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      text-align: center;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .tray-count {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
      text-align: center;
      margin: 4px 0 2px;
      min-height: 18px;
    }

    /* Decorate screen */
    .decorate-canvas-wrap {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    #decorate-canvas {
      border-radius: 14px;
      max-width: 100%;
      touch-action: none;
      border: 1.5px solid rgba(0,0,0,0.12);
      box-shadow: var(--puzzle-card-shadow);
    }

    .tool-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .tool-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      font-family: var(--serif);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }

    .tool-btn:active { transform: scale(0.94); }
    .tool-btn.sticker-btn { font-family: var(--sans); font-size: 13px; font-weight: 500; }

    /* Overlay layers on decorate canvas */
    .overlay-layer {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .overlay-item {
      position: absolute;
      pointer-events: auto;
      touch-action: none;
      cursor: grab;
      user-select: none;
    }

    .overlay-item.selected { outline: 1.5px dashed rgba(0,0,0,0.3); outline-offset: 4px; }

    .overlay-item .delete-btn {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--black);
      color: #fff;
      border: none;
      font-size: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      z-index: 5;
    }

    .overlay-item.selected .delete-btn,
    .overlay-item.show-delete .delete-btn { display: flex; }

    .overlay-item img {
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .overlay-item.text-item {
      white-space: nowrap;
      padding: 0;
      background: transparent;
    }

    .overlay-item.text-item .text-label {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      line-height: 1.2;
      white-space: nowrap;
    }

    /* Text styling toolbar */
    .text-style-toolbar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .text-style-toolbar .style-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .text-style-toolbar .style-label {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      color: #666;
      min-width: 42px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .color-swatches {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.12);
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .color-swatch.active {
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--black);
      transform: scale(1.08);
    }

    .color-swatch-custom {
      background: conic-gradient(#ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6, #ff6b6b);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .color-swatch-custom .color-swatch-plus {
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 0 3px rgba(0,0,0,0.45);
      line-height: 1;
      pointer-events: none;
    }

    .color-swatch-custom.active .color-swatch-plus { opacity: 0; }

    .color-input-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .color-tool-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.9);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .color-tool-btn:active { transform: scale(0.94); }

    .color-tool-btn.active {
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--black);
    }

    .color-tool-btn svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: var(--black);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .decorate-canvas-wrap.eyedropper-mode {
      cursor: crosshair;
    }

    .decorate-canvas-wrap.eyedropper-mode .overlay-layer {
      pointer-events: none;
    }

    .eyedropper-hint {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 14px;
      pointer-events: none;
    }

    .eyedropper-hint[hidden] { display: none !important; }

    .eyedropper-hint span {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      background: rgba(26, 26, 26, 0.82);
      color: #fff;
      padding: 8px 14px;
      border-radius: 999px;
    }

    .font-btn {
      font-family: var(--sans);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid rgba(0,0,0,0.15);
      background: #f5f5f5;
      cursor: pointer;
      color: var(--black);
    }

    .font-btn.active {
      background: var(--black);
      color: #fff;
      border-color: var(--black);
    }

    .font-btn.font-btn-serif { font-family: var(--serif); }
    .font-btn.font-btn-hand { font-family: 'Caveat', cursive; font-size: 15px; }

    .color-swatch-none {
      background-color: #ececec;
      background-image:
        linear-gradient(45deg, #c8c8c8 25%, transparent 25%),
        linear-gradient(-45deg, #c8c8c8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #c8c8c8 75%),
        linear-gradient(-45deg, transparent 75%, #c8c8c8 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0;
      position: relative;
      overflow: hidden;
    }

    .color-swatch-none::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 140%;
      height: 2px;
      background: #d64545;
      transform: translate(-50%, -50%) rotate(-45deg);
      pointer-events: none;
    }

    .text-style-bar {
      width: 100%;
      max-width: 340px;
      padding: 12px 14px;
      margin-bottom: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
      border: 1.5px solid rgba(0,0,0,0.1);
    }

    .text-style-bar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .text-style-bar-label {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .overlay-delete-bar-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--black);
      color: #fff;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .text-style-bar[hidden] { display: none !important; }

    .text-style-bar .text-style-toolbar { margin-top: 0; }

    .resize-handle {
      position: absolute;
      bottom: -8px;
      right: -8px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--black);
      border: 2px solid #fff;
      cursor: nwse-resize;
      display: none;
    }

    .rotate-handle {
      position: absolute;
      top: -8px;
      left: -8px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--black);
      cursor: grab;
      display: none;
      font-size: 10px;
      line-height: 14px;
      text-align: center;
      color: var(--black);
    }

    .overlay-item.selected .rotate-handle,
    .overlay-item.selected .resize-handle { display: block; }

    /* Bottom sheet */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

    .bottom-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px 20px 0 0;
      z-index: 101;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      padding: 12px 24px 32px;
      max-height: 55vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .bottom-sheet h3 {
      font-family: var(--serif);
      font-size: 16px;
      letter-spacing: 0.25em;
      text-indent: 0.25em;
      font-weight: 500;
    }

    .bottom-sheet .panel-header {
      margin-bottom: 20px;
    }

    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      justify-items: center;
    }

    .sticker-thumb {
      width: 72px;
      height: 72px;
      cursor: pointer;
      transition: transform 0.15s;
      padding: 4px;
    }

    .sticker-thumb:active { transform: scale(0.9); }
    .sticker-thumb img { width: 100%; height: 100%; object-fit: contain; }

    /* Share sheet */
    .share-sheet h3 {
      text-align: center;
      margin-bottom: 4px;
    }

    .share-sheet-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    .share-option {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1.5px solid rgba(0, 0, 0, 0.1);
      background: #fff;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 500;
      color: var(--black);
      cursor: pointer;
      text-align: left;
      transition: transform 0.12s, opacity 0.12s;
    }

    .share-option:active:not(:disabled) { transform: scale(0.98); }

    .share-option:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .share-option-primary {
      background: linear-gradient(135deg, #f58529 0%, #dd2a7b 50%, #8134af 100%);
      color: #fff;
      border: none;
      font-family: var(--serif);
      font-size: 17px;
      letter-spacing: 0.03em;
    }

    .share-option-cancel {
      justify-content: center;
      background: #f3f3f3;
      border: none;
      margin-top: 4px;
    }

    .share-option-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.22);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .share-option:not(.share-option-primary) .share-option-icon {
      background: rgba(0, 0, 0, 0.06);
      color: var(--black);
      font-size: 16px;
    }

    .share-option-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .share-option-sub {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.82;
      line-height: 1.35;
    }

    .share-hint {
      margin-top: 14px;
      font-family: var(--sans);
      font-size: 12px;
      line-height: 1.45;
      color: #666;
      text-align: center;
      min-height: 36px;
    }

    .share-hint.is-error { color: #b32; }
    .share-hint.is-success { color: #2d6a3e; }

    /* Share preview */
    #share-preview {
      border-radius: 14px;
      max-width: 100%;
      margin-bottom: 12px;
      border: 1.5px solid rgba(0,0,0,0.1);
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 12px 20px 20px;
      flex-shrink: 0;
    }

    footer .credit {
      font-family: var(--serif);
      font-size: 13px;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
      margin-bottom: 10px;
    }

    .social-row {
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .social-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      transition: background 0.2s;
    }

    .social-icon:hover { background: rgba(255,255,255,0.15); }
    .social-icon svg { width: 16px; height: 16px; fill: currentColor; }

    /* Text input modal */
    .text-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
      padding: 20px;
    }

    .text-modal.open { display: flex; }

    .text-modal-inner {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: min(320px, 90vw);
      position: relative;
    }

    .text-modal-inner .panel-header {
      margin-bottom: 12px;
    }

    .text-modal-inner .panel-header h3 {
      font-family: var(--serif);
      font-size: 18px;
      letter-spacing: 0;
      text-indent: 0;
    }

    .text-modal-inner input {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-family: var(--serif);
      font-size: 18px;
      outline: none;
    }

    .text-modal-inner input:focus { border-color: var(--black); }

    #text-input.text-preview {
      transition: color 0.15s, background 0.15s, font-family 0.15s;
    }

    .text-modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: center;
    }

    .text-modal-actions button {
      font-family: var(--serif);
      padding: 10px 24px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 15px;

    /* Dragging piece on play screen */
    .floating-piece {
      position: fixed;
      z-index: 50;
      pointer-events: none;
      touch-action: none;
    }
  </style>
</head>

  /* ============================================================
     ANALYTICS (GA4) — usage metrics only, no images or personal data
     ============================================================ */
  function analyticsEnabled() {
    const host = location.hostname;
    return host !== 'localhost' && host !== '127.0.0.1' && host !== '';
  }

  function trackEvent(name, params) {
    if (!analyticsEnabled() || typeof gtag !== 'function') return;
    try {
      gtag('event', name, params || {});
    } catch (_) {}
  }

  trackEvent('app_opened');

  /* ============================================================
     JIGSAW PIECE SHAPES — headbreaker (Rounded outline)
     ============================================================ */
  const HeadbreakerGen = (() => {
    const PUZZLE_W = 300;
    const PUZZLE_H = 400;
    const BORDER_FILL = 12;
    const PROXIMITY = 18;
    const LINE_SOFTNESS = 0.18;

    const PIECE_STROKE = {
      color: 'rgba(255, 255, 255, 0.98)',
      width: 2,
    };

    const OUTLINE = new headbreaker.outline.Rounded();

    let hbCanvas = null;
    let hbPuzzle = null;
    let gridRows = 0;
    let gridCols = 0;
    let nativeCellW = 0;
    let nativeCellH = 0;
    /** @type {Map<string, { points: number[], bbox: {x:number,y:number,width:number,height:number} }>} */
    let pieceCache = new Map();

    function getStrokeWidth() {
      return PIECE_STROKE.width;
    }

    function applyPieceStroke(ctx) {
      ctx.save();
      ctx.strokeStyle = PIECE_STROKE.color;
      ctx.lineWidth = PIECE_STROKE.width;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();
    }

    function pieceKey(row, col) {
      return `${row},${col}`;
    }

    function getHbPiece(row, col) {
      return hbPuzzle.pieces[row * gridCols + col];
    }

    function traceKonvaBezierPath(ctx, points, ox, oy) {
      if (points.length < 2) return;
      ctx.moveTo(points[0] + ox, points[1] + oy);
      for (let i = 2; i < points.length; i += 6) {
        if (i + 5 < points.length) {
          ctx.bezierCurveTo(
            points[i] + ox, points[i + 1] + oy,
            points[i + 2] + ox, points[i + 3] + oy,
            points[i + 4] + ox, points[i + 5] + oy
          );
        } else if (i + 1 < points.length) {
          ctx.lineTo(points[i] + ox, points[i + 1] + oy);
        }
      }
      ctx.closePath();
    }

    function bboxFromPoints(points, ox, oy) {
      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;
      for (let i = 0; i < points.length; i += 2) {
        const x = points[i] + ox;
        const y = points[i + 1] + oy;
        minX = Math.min(minX, x);
        minY = Math.min(minY, y);
        maxX = Math.max(maxX, x);
        maxY = Math.max(maxY, y);
      }
      const pad = PIECE_STROKE.width;
      return {
        x: minX - pad,
        y: minY - pad,
        width: maxX - minX + pad * 2,
        height: maxY - minY + pad * 2,
      };
    }

    function getPieceGeometry(row, col) {
      const key = pieceKey(row, col);
      if (pieceCache.has(key)) return pieceCache.get(key);

      const piece = getHbPiece(row, col);
      const points = OUTLINE.draw(piece, piece.diameter, BORDER_FILL);
      const ox = piece.centralAnchor.x - piece.radius.x;
      const oy = piece.centralAnchor.y - piece.radius.y;
      const bbox = bboxFromPoints(points, ox, oy);
      const geo = { points, ox, oy, bbox, piece };
      pieceCache.set(key, geo);
      return geo;
    }

    function destroyEngine() {
      pieceCache = new Map();
      hbPuzzle = null;
      if (hbCanvas) {
        hbCanvas.clear();
        hbCanvas = null;
      }
      const el = document.getElementById('hb-engine');
      if (el) el.innerHTML = '';
    }

    /** Build headbreaker puzzle at native 300×400 — returns { depth } for app state */
    function initGeometry(img, rows, cols) {
      destroyEngine();
      gridRows = rows;
      gridCols = cols;
      nativeCellW = PUZZLE_W / cols;
      nativeCellH = PUZZLE_H / rows;

      hbCanvas = new headbreaker.Canvas('hb-engine', {
        width: PUZZLE_W,
        height: PUZZLE_H,
        pieceSize: headbreaker.vector(nativeCellW, nativeCellH),
        proximity: PROXIMITY,
        borderFill: BORDER_FILL,
        strokeWidth: PIECE_STROKE.width,
        strokeColor: PIECE_STROKE.color,
        lineSoftness: LINE_SOFTNESS,
        image: img,
        fixed: true,
        outline: OUTLINE,
        painter: new headbreaker.painters.Konva(),
      });

      const manufacturer = new headbreaker.Manufacturer();
      manufacturer.withDimensions(cols, rows);
      manufacturer.withHeadAt(headbreaker.anchor(nativeCellW / 2, nativeCellH / 2));
      manufacturer.withInsertsGenerator(headbreaker.generators.twoAndTwo);
      hbCanvas.autogenerateWithManufacturer(manufacturer);
      hbCanvas.draw();
      hbPuzzle = hbCanvas.puzzle;

      return { depth: BORDER_FILL };
    }

    function buildPiecePath(ctx, row, col, slotX, slotY, cellW, cellH) {
      const geo = getPieceGeometry(row, col);
      const scale = cellW / nativeCellW;
      const ox = slotX + (geo.ox - col * nativeCellW) * scale;
      const oy = slotY + (geo.oy - row * nativeCellH) * scale;
      const scaled = geo.points.map((v, i) => v * (i % 2 === 0 ? scale : scale));
      ctx.beginPath();
      traceKonvaBezierPath(ctx, scaled, ox, oy);
    }

    function strokePiecePath(ctx, row, col, slotX, slotY, cellW, cellH) {
      buildPiecePath(ctx, row, col, slotX, slotY, cellW, cellH);
      applyPieceStroke(ctx);
    }

    function createPieceCanvas(img, row, col) {
      const geo = getPieceGeometry(row, col);
      const figure = hbCanvas.getFigure(geo.piece);
      const rect = figure.group.getClientRect({ skipTransform: false });
      const out = document.createElement('canvas');
      out.width = Math.max(1, Math.ceil(rect.width));
      out.height = Math.max(1, Math.ceil(rect.height));
      rasterizePieceImage(row, col, out, rect);

      return {
        canvas: out,
        padTop: rect.y - row * nativeCellH,
        padLeft: rect.x - col * nativeCellW,
        padRight: (col + 1) * nativeCellW - (rect.x + rect.width),
        padBottom: (row + 1) * nativeCellH - (rect.y + rect.height),
      };
    }

    /** Clip to headbreaker path; align full puzzle image in native 300×400 space */
    function rasterizePieceImage(row, col, targetCanvas, rect) {
      const geo = getPieceGeometry(row, col);
      const img = hbCanvas.imageMetadataFor(geo.piece).content;
      const { points, ox, oy } = geo;
      const ctx = targetCanvas.getContext('2d');

      ctx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
      ctx.save();
      traceKonvaBezierPath(ctx, points, ox - rect.x, oy - rect.y);
      ctx.clip();
      ctx.drawImage(img, -rect.x, -rect.y, PUZZLE_W, PUZZLE_H);
      ctx.restore();
    }

    /** @deprecated kept for dev — Konva export bleeds neighboring pieces */
    function exportPieceFromKonva(row, col) {
      return createPieceCanvas(null, row, col);
    }

    function strokeRasterizedPiece(ctx, row, col, originX, originY, scale) {
      const geo = getPieceGeometry(row, col);
      const ox = originX + (geo.ox - col * nativeCellW) * scale;
      const oy = originY + (geo.oy - row * nativeCellH) * scale;
      const scaled = geo.points.map((v) => v * scale);
      ctx.beginPath();
      traceKonvaBezierPath(ctx, scaled, ox, oy);
      applyPieceStroke(ctx);
    }

    function strokeOnPieceCanvas(ctx, row, col) {
      const geo = getPieceGeometry(row, col);
      const figure = hbCanvas.getFigure(geo.piece);
      const rect = figure.group.getClientRect({ skipTransform: false });
      const localOx = geo.ox - rect.x;
      const localOy = geo.oy - rect.y;
      ctx.beginPath();
      traceKonvaBezierPath(ctx, geo.points, localOx, localOy);
      applyPieceStroke(ctx);
    }

    function setStrokeColor(color) {
      PIECE_STROKE.color = color;
    }

    function getStrokeColor() {
      return PIECE_STROKE.color;
    }

    return {
      PUZZLE_W,
      PUZZLE_H,
      PIECE_STROKE,
      BORDER_FILL,
      getStrokeWidth,
      setStrokeColor,
      getStrokeColor,
      initGeometry,
      buildPiecePath,
      strokePiecePath,
      createPieceCanvas,
      strokeRasterizedPiece,
      strokeOnPieceCanvas,
      exportPieceFromKonva,
      destroyEngine,
    };
  })();

  /** Crop + resize uploaded photo to fixed 300×400 puzzle aspect (cover) */
  function resizeImageToPuzzleSize(sourceImg) {
    const canvas = document.createElement('canvas');
    canvas.width = PUZZLE_WIDTH;
    canvas.height = PUZZLE_HEIGHT;
    const ctx = canvas.getContext('2d');

    const dstAspect = PUZZLE_WIDTH / PUZZLE_HEIGHT;
    const srcAspect = sourceImg.width / sourceImg.height;
    let sx, sy, sw, sh;

    if (srcAspect > dstAspect) {
      sh = sourceImg.height;
      sw = sh * dstAspect;
      sx = (sourceImg.width - sw) / 2;
      sy = 0;
    } else {
      sw = sourceImg.width;
      sh = sw / dstAspect;
      sx = 0;
      sy = (sourceImg.height - sh) / 2;
    }

    ctx.drawImage(sourceImg, sx, sy, sw, sh, 0, 0, PUZZLE_WIDTH, PUZZLE_HEIGHT);

    return new Promise((resolve) => {
      const resized = new Image();
      resized.onload = () => resolve(resized);
      resized.src = canvas.toDataURL('image/jpeg', 0.92);
    });
  }

    if (state.imageUrl) URL.revokeObjectURL(state.imageUrl);
    state.imageUrl = URL.createObjectURL(file);
    const img = new Image();

      btnStart.disabled = false;

  const STROKE_COLORS = [
    { id: 'white', value: '#ffffff' },

  function hexToStrokeRgba(hex, opacity = 0.98) {
    const h = normalizeHexColor(hex);
    const r = parseInt(h.slice(1, 3), 16);
    const g = parseInt(h.slice(3, 5), 16);
    const b = parseInt(h.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
  }

  function isPresetStrokeColor(hex) {
    return STROKE_COLORS.some((c) => c.value.toLowerCase() === normalizeHexColor(hex));
  }

  function refreshDecoratePuzzleCanvas() {

    state.strokeColor = normalizeHexColor(hex);
    HeadbreakerGen.setStrokeColor(hexToStrokeRgba(state.strokeColor));
    state.assembledCanvas = null;
    state.pieces.forEach((p) => { p._composed = null; });

      drawBoard();

  function syncStrokeColorUI() {
    const row = $('#stroke-color-swatches');
    if (!row) return;
    const color = normalizeHexColor(state.strokeColor);
    const isCustom = !isPresetStrokeColor(color);

    row.querySelectorAll('.color-swatch[data-stroke-color]').forEach((btn) => {
      btn.classList.toggle('active', normalizeHexColor(btn.dataset.strokeColor) === color);
    });

    const customBtn = row.querySelector('[data-stroke-custom]');
    if (customBtn) {
      customBtn.classList.toggle('active', isCustom);
      customBtn.style.background = isCustom ? color : '';

    const colorInput = row.querySelector('[data-stroke-color-input]');
    if (colorInput) colorInput.value = color;
  }

  function initStrokeColorUI() {
    const row = $('#stroke-color-swatches');
    if (!row || row.dataset.ready) return;
    row.dataset.ready = '1';

    const swatches = STROKE_COLORS.map((c) =>
      `<button type="button" class="color-swatch" data-stroke-color="${c.value}" data-stroke-id="${c.id}" style="background:${c.value};${c.id === 'white' ? 'box-shadow:inset 0 0 0 1px rgba(0,0,0,0.12)' : ''}" title="${c.id}"></button>`
    ).join('');

    row.innerHTML = `
      ${swatches}

        <span class="color-swatch-plus">+</span>
      </button>
      <input type="color" class="color-input-hidden" data-stroke-color-input value="#ffffff" tabindex="-1" aria-hidden="true">
    `;

    row.addEventListener('click', (e) => {
      const swatch = e.target.closest('.color-swatch[data-stroke-color]');
      if (swatch) {
        applyStrokeColor(swatch.dataset.strokeColor);
        return;
      }
      if (e.target.closest('[data-stroke-custom]')) {
        row.querySelector('[data-stroke-color-input]')?.click();
      }
    });

    row.querySelector('[data-stroke-color-input]')?.addEventListener('input', (e) => {
      applyStrokeColor(e.target.value);

    HeadbreakerGen.setStrokeColor(hexToStrokeRgba(state.strokeColor));
    syncStrokeColorUI();
  }

  /* ============================================================
     PUZZLE INIT
     ============================================================ */
  function initPuzzle({ preserveProgress = false } = {}) {
    state.puzzleCompletedTracked = false;
    state.decorateReady = false;

    const lockedSet = preserveProgress
      ? new Set(state.pieces.filter(p => p.locked).map(p => `${p.row},${p.col}`))
      : null;

    const { rows, cols } = getOrientedGrid(state.gridKey);
    state.rows = rows;
    state.cols = cols;

    const img = state.image;
    const scale = Math.min(1, (window.innerWidth - 40) / PUZZLE_WIDTH);
    state.boardW = PUZZLE_WIDTH * scale;
    state.boardH = PUZZLE_HEIGHT * scale;
    state.cellW = state.boardW / cols;
    state.cellH = state.boardH / rows;

    HeadbreakerGen.setStrokeColor(hexToStrokeRgba(state.strokeColor));
    const { depth } = HeadbreakerGen.initGeometry(img, rows, cols);
    state.depth = depth;

    const boardScale = state.boardW / HeadbreakerGen.PUZZLE_W;

    state.pieces = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const pieceData = HeadbreakerGen.createPieceCanvas(img, r, c);
        state.pieces.push({
          row: r, col: c,
          canvas: pieceData.canvas,
          padTop: pieceData.padTop * boardScale,
          padLeft: pieceData.padLeft * boardScale,
          padRight: pieceData.padRight * boardScale,
          padBottom: pieceData.padBottom * boardScale,
          locked: lockedSet ? lockedSet.has(`${r},${c}`) : false,
          trayX: 0, trayY: 0,
          boardX: c * state.cellW,
          boardY: r * state.cellH,
          _composed: null,
        });
      }
    }

    scatterTrayPieces();
    resizeCanvases();
    drawBoard();
    drawTray();
    updateSaveButton();
    updateTrayVisibility();
    updateTrayCount();
  }

  function scatterTrayPieces() {
    const unlocked = state.pieces.filter(p => !p.locked);
    const maxTrayW = Math.min(340, window.innerWidth - 40);
    const slotW = unlocked.length
      ? Math.min(78, Math.floor((maxTrayW - 24) / unlocked.length))
      : 78;
    const trayW = Math.max(160, 24 + unlocked.length * slotW);
    state.trayW = trayW;
    state.trayH = 96;
    state.traySlotW = slotW;

    unlocked.forEach((p, i) => {
      p.trayX = 12 + i * slotW;
      p.trayY = 12;
    });

    resizeTrayCanvas();
  }

  function resizeTrayCanvas() {
    const dpr = window.devicePixelRatio || 1;
    trayCanvas.width = state.trayW * dpr;
    trayCanvas.height = state.trayH * dpr;
    trayCanvas.style.width = state.trayW + 'px';
    trayCanvas.style.height = state.trayH + 'px';
    const ctx = trayCanvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  /** Resize tray bitmap, wipe stale pixels, redraw remaining pieces */
  function refreshTray() {
    scatterTrayPieces();
    drawTray();
    updateTrayCount();
  }

  function updateTrayCount() {
    const el = $('#tray-count');
    if (!el) return;
    const left = state.pieces.filter((p) => !p.locked).length;
    el.textContent = left ? `${left} piece${left === 1 ? '' : 's'} left` : '';
  }

  function resizeCanvases() {
    const dpr = window.devicePixelRatio || 1;
    boardCanvas.width = state.boardW * dpr;
    boardCanvas.height = state.boardH * dpr;
    boardCanvas.style.width = state.boardW + 'px';
    boardCanvas.style.height = state.boardH + 'px';
    boardCanvas.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    resizeTrayCanvas();
  }

  function drawBoard() {
    const ctx = boardCanvas.getContext('2d');
    const { rows, cols, cellW, cellH } = state;
    const img = state.image;
    const r = 14;
    ctx.clearRect(0, 0, state.boardW, state.boardH);

    ctx.save();
    ctx.beginPath();
    ctx.roundRect(0, 0, state.boardW, state.boardH, r);
    ctx.clip();

    ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.fillRect(0, 0, state.boardW, state.boardH);

    /* One faint ghost of the full photo — not repeated per slot */
    if (img && img.width) {
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.drawImage(img, 0, 0, state.boardW, state.boardH);
      ctx.restore();
    }

    /* Empty slots — dashed outline only (not a photo duplicate) */
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const piece = state.pieces.find(p => p.row === row && p.col === col);
        if (piece && piece.locked) continue;
        ctx.save();
        HeadbreakerGen.buildPiecePath(ctx, row, col, col * cellW, row * cellH, cellW, cellH);
        ctx.strokeStyle = hexToStrokeRgba(state.strokeColor, 0.6);
        ctx.lineWidth = 1.5;
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.restore();
      }
    }

    /* Locked pieces — image only, no per-piece stroke */
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const piece = state.pieces.find(p => p.row === row && p.col === col);
        if (piece && piece.locked) {
          const boardScale = state.boardW / HeadbreakerGen.PUZZLE_W;
          const dw = piece.canvas.width * boardScale;
          const dh = piece.canvas.height * boardScale;
          ctx.drawImage(
            piece.canvas,
            col * cellW - piece.padLeft,
            row * cellH - piece.padTop,
            dw,
            dh
          );
        }
      }
    }

    /* Single thin stroke pass on every cell — uniform seams like reference */
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        HeadbreakerGen.strokePiecePath(ctx, row, col, col * cellW, row * cellH, cellW, cellH);
      }
    }

    ctx.restore();
  }

  function composePieceWithStroke(piece) {
    if (piece._composed) return piece._composed;
    const dc = document.createElement('canvas');
    dc.width = piece.canvas.width;
    dc.height = piece.canvas.height;
    const dctx = dc.getContext('2d');
    dctx.drawImage(piece.canvas, 0, 0);
    HeadbreakerGen.strokeOnPieceCanvas(dctx, piece.row, piece.col);
    piece._composed = dc;
    return dc;
  }

  function drawTray() {
    resizeTrayCanvas();
    const ctx = trayCanvas.getContext('2d');
    const w = state.trayW;
    const h = state.trayH;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.96)';
    ctx.fillRect(0, 0, w, h);

    const dragging = dragState?.piece;
    state.pieces.filter(p => !p.locked && p !== dragging).forEach(p => {
      const pw = p.canvas.width;
      const ph = p.canvas.height;
      const scale = Math.min(72 / pw, 72 / ph);
      const dw = pw * scale;
      const dh = ph * scale;
      const composed = composePieceWithStroke(p);
      ctx.drawImage(composed, p.trayX, p.trayY, dw, dh);
      p._trayDw = dw;
      p._trayDh = dh;
    });
  }

  function updateTrayVisibility() {
    const hasUnlocked = state.pieces.some(p => !p.locked);
    if (trayWrap) trayWrap.style.display = hasUnlocked ? '' : 'none';
  }

  function updateSaveButton() {
    const allLocked = state.pieces.length > 0 && state.pieces.every(p => p.locked);
    if (allLocked && !state.puzzleCompletedTracked) {
      state.puzzleCompletedTracked = true;
      trackEvent('puzzle_completed');
    }
    $('#btn-save-play').disabled = !allLocked;
    updateTrayVisibility();
    updateTrayCount();
  }

  /* Grid pill switching */
  $$('.grid-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      $$('.grid-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      state.gridKey = pill.dataset.grid;
      initPuzzle();
    });
  });

  /* ============================================================
     DRAG & SNAP
     ============================================================ */
  let dragState = null;

  function getPointerPos(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: (clientX - rect.left) * (canvas.width / rect.width) / (window.devicePixelRatio || 1),
      y: (clientY - rect.top) * (canvas.height / rect.height) / (window.devicePixelRatio || 1),
    };
  }

  function findTrayPieceAt(x, y) {
    for (let i = state.pieces.length - 1; i >= 0; i--) {
      const p = state.pieces[i];
      if (p.locked) continue;
      if (x >= p.trayX && x <= p.trayX + p._trayDw && y >= p.trayY && y <= p.trayY + p._trayDh) {
        return p;
      }
    }
    return null;
  }

  const SNAP_THRESHOLD = 50;

  function getPieceSnapTarget(piece) {
    const boardScale = state.boardW / HeadbreakerGen.PUZZLE_W;
    return {
      x: piece.col * state.cellW - piece.padLeft + (piece.canvas.width * boardScale) / 2,
      y: piece.row * state.cellH - piece.padTop + (piece.canvas.height * boardScale) / 2,
    };
  }

  function findNearestEmptySlot(bx, by) {
    let best = null;
    let bestDist = SNAP_THRESHOLD;
    for (const p of state.pieces) {
      if (p.locked) continue;
      const t = getPieceSnapTarget(p);
      const d = Math.hypot(bx - t.x, by - t.y);
      if (d < bestDist) {
        bestDist = d;
        best = p;
      }
    }
    return best;
  }

  function startDrag(piece, clientX, clientY, source) {
    dragState = { piece, source, startX: clientX, startY: clientY };

    const pw = piece.canvas.width;
    const ph = piece.canvas.height;
    const trayScale = Math.min(72 / pw, 72 / ph);
    const dw = source === 'tray' ? pw * trayScale : pw;
    const dh = source === 'tray' ? ph * trayScale : ph;

    floatingPiece.src = composePieceWithStroke(piece).toDataURL();
    floatingPiece.style.width = dw + 'px';
    floatingPiece.style.height = dh + 'px';
    floatingPiece.style.display = 'block';
    floatingPiece.style.left = (clientX - dw / 2) + 'px';
    floatingPiece.style.top = (clientY - dh / 2) + 'px';

    if (source === 'tray') {
      piece._composed = null;
      drawTray();
    }
  }

  function onPointerDown(e) {
    if (state.screen !== 'play') return;
    e.preventDefault();

    const trayPos = getPointerPos(e, trayCanvas);
    const piece = findTrayPieceAt(trayPos.x, trayPos.y);
    if (!piece) return;

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    startDrag(piece, clientX, clientY, 'tray');
  }

  function onPointerMove(e) {
    if (!dragState) return;
    e.preventDefault();
    const { piece } = dragState;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    const boardRect = boardCanvas.getBoundingClientRect();
    const overBoard = clientX >= boardRect.left && clientX <= boardRect.right &&
                      clientY >= boardRect.top && clientY <= boardRect.bottom;

    const pw = piece.canvas.width;
    const ph = piece.canvas.height;
    const trayScale = Math.min(72 / pw, 72 / ph);
    const boardScale = state.boardW / HeadbreakerGen.PUZZLE_W;
    const scale = overBoard ? boardScale : trayScale;
    const dw = pw * scale;
    const dh = ph * scale;

    floatingPiece.style.width = dw + 'px';
    floatingPiece.style.height = dh + 'px';
    floatingPiece.style.left = (clientX - dw / 2) + 'px';
    floatingPiece.style.top = (clientY - dh / 2) + 'px';
  }

  function onPointerUp(e) {
    if (!dragState) {
      floatingPiece.style.display = 'none';
      return;
    }
    const { piece } = dragState;
    const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

    const boardRect = boardCanvas.getBoundingClientRect();
    const scaleX = state.boardW / boardRect.width;
    const scaleY = state.boardH / boardRect.height;
    const bx = (clientX - boardRect.left) * scaleX;
    const by = (clientY - boardRect.top) * scaleY;

    const target = getPieceSnapTarget(piece);
    const dist = Math.hypot(bx - target.x, by - target.y);
    const nearest = findNearestEmptySlot(bx, by);
    const onBoard = bx >= -20 && bx <= state.boardW + 20 && by >= -20 && by <= state.boardH + 20;

    if (onBoard && nearest === piece && dist < SNAP_THRESHOLD) {
      piece.locked = true;
      piece._composed = null;
      drawBoard();
      refreshTray();
      updateSaveButton();
    } else {
      const trayRect = trayCanvas.getBoundingClientRect();
      const tx = clientX - trayRect.left - 32;
      const ty = clientY - trayRect.top - 32;
      piece.trayX = Math.max(10, Math.min(state.trayW - 70, tx));
      piece.trayY = Math.max(10, Math.min(state.trayH - 70, ty));
      piece._composed = null;
      drawTray();
    }

    floatingPiece.style.display = 'none';
    dragState = null;
  }

  trayCanvas.addEventListener('mousedown', onPointerDown);
  trayCanvas.addEventListener('touchstart', onPointerDown, { passive: false });
  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('touchmove', onPointerMove, { passive: false });
  document.addEventListener('mouseup', onPointerUp);
  document.addEventListener('touchend', onPointerUp);
  document.addEventListener('touchcancel', onPointerUp);
  document.addEventListener('pointercancel', onPointerUp);

  /* ============================================================
     FLATTEN PUZZLE → DECORATE
     ============================================================ */
  function flattenPuzzle() {
    const { boardW, boardH, rows, cols, cellW, cellH } = state;
    const img = state.image;
    const boardScale = boardW / HeadbreakerGen.PUZZLE_W;
    const canvas = document.createElement('canvas');
    canvas.width = boardW;
    canvas.height = boardH;
    const ctx = canvas.getContext('2d');
    const r = 14;

    ctx.save();
    ctx.beginPath();
    ctx.roundRect(0, 0, boardW, boardH, r);
    ctx.clip();

    if (img && img.width) {
      ctx.drawImage(img, 0, 0, boardW, boardH);
    }

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const piece = state.pieces.find(p => p.row === row && p.col === col);
        if (piece) {
          const dw = piece.canvas.width * boardScale;
          const dh = piece.canvas.height * boardScale;
          ctx.drawImage(
            piece.canvas,
            col * cellW - piece.padLeft,
            row * cellH - piece.padTop,
            dw,
            dh
          );
        }
      }
    }

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        HeadbreakerGen.strokePiecePath(ctx, row, col, col * cellW, row * cellH, cellW, cellH);
      }
    }

    ctx.restore();
    state.assembledCanvas = canvas;
    return canvas;
  }

  function setupDecorateScreen({ resetOverlays = true } = {}) {
    const flat = flattenPuzzle();
    const maxW = Math.min(300, window.innerWidth - 40);
    const scale = maxW / flat.width;
    const dw = flat.width * scale;
    const dh = flat.height * scale;

    decorateCanvas.width = flat.width;
    decorateCanvas.height = flat.height;
    decorateCanvas.style.width = dw + 'px';
    decorateCanvas.style.height = dh + 'px';

    const ctx = decorateCanvas.getContext('2d');
    ctx.drawImage(flat, 0, 0);

    const overlayLayer = $('#overlay-layer');
    overlayLayer.style.width = dw + 'px';
    overlayLayer.style.height = dh + 'px';

    if (resetOverlays) {
      overlayLayer.innerHTML = '';
      state.overlays = [];
      state.selectedOverlay = null;
      textStyleBar.hidden = true;
    }
  }

  $('#btn-save-play').addEventListener('click', () => {
    setupDecorateScreen({ resetOverlays: !state.decorateReady });
    state.decorateReady = true;
    initStrokeColorUI();
    showScreen('decorate');
    trackEvent('decorate_done');
  });

  $('#btn-back-play').addEventListener('click', () => {
    showScreen('upload');
  });

  /* ============================================================
     DECORATE — STICKERS & TEXT
     ============================================================ */
  const TEXT_COLORS = [
    { id: 'white', value: '#ffffff' },
    { id: 'black', value: '#1a1a1a' },
    { id: 'rose', value: '#e8a0b4' },
    { id: 'sky', value: '#7eb8da' },
    { id: 'peach', value: '#f5c99a' },
    { id: 'sage', value: '#a8c9a0' },
  ];

  const TEXT_BG_COLORS = [
    { id: 'white', value: 'rgba(255, 255, 255, 0.88)' },
    { id: 'black', value: 'rgba(26, 26, 26, 0.85)' },
    { id: 'rose', value: 'rgba(232, 160, 180, 0.88)' },
    { id: 'sky', value: 'rgba(126, 184, 218, 0.88)' },
    { id: 'peach', value: 'rgba(245, 201, 154, 0.88)' },
    { id: 'sage', value: 'rgba(168, 201, 160, 0.88)' },
  ];

  const BG_COLOR_OPACITY = 0.88;

  const TEXT_FONTS = {
    serif: { label: 'Serif', family: '"Instrument Serif", Georgia, serif', cssFamily: 'var(--serif)' },
    sans: { label: 'Inter', family: '"Inter", system-ui, sans-serif', cssFamily: 'var(--sans)' },
    hand: { label: 'Script', family: '"Caveat", cursive', cssFamily: '"Caveat", cursive' },
  };

  const DEFAULT_TEXT_STYLE = {
    color: '#ffffff',
    bgColor: 'rgba(26, 26, 26, 0.85)',
    fontKey: 'serif',
  };

  let textStyleDraft = { ...DEFAULT_TEXT_STYLE };
  let editingTextOverlay = null;

  function getFontFamily(fontKey) {
    return (TEXT_FONTS[fontKey] || TEXT_FONTS.serif).family;
  }

  function normalizeHexColor(color) {
    if (!color) return '#ffffff';
    const hex = String(color).trim().toLowerCase();
    if (/^#[0-9a-f]{6}$/.test(hex)) return hex;
    if (/^#[0-9a-f]{3}$/.test(hex)) {
      return '#' + hex.slice(1).split('').map((c) => c + c).join('');
    }
    return '#ffffff';
  }

  function isPresetTextColor(color) {
    const hex = normalizeHexColor(color);
    return TEXT_COLORS.some((c) => c.value.toLowerCase() === hex);
  }

  function normalizeBgColor(bgColor) {
    if (bgColor === null || bgColor === undefined || bgColor === 'none' || bgColor === 'transparent') {
      return null;
    }
    return bgColor;
  }

  function isPresetBgColor(bgColor) {
    const bg = normalizeBgColor(bgColor);
    if (!bg) return false;
    return TEXT_BG_COLORS.some((c) => c.value === bg);
  }

  function hexToBgRgba(hex, opacity = BG_COLOR_OPACITY) {
    const h = normalizeHexColor(hex);
    const r = parseInt(h.slice(1, 3), 16);
    const g = parseInt(h.slice(3, 5), 16);
    const b = parseInt(h.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
  }

  function rgbaToHex(rgba) {
    const match = String(rgba).match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
    if (!match) return '#ffffff';
    return '#' + [match[1], match[2], match[3]].map((n) => Number(n).toString(16).padStart(2, '0')).join('');
  }

  const EYEDROPPER_ICON = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 21l8-8"/><path d="M14 4l6 6"/><path d="M9.5 8.5l2 2"/><path d="M16 3l5 5-9 9-5-5 9-9z"/><path d="M20 7l-2 2"/></svg>`;

  let eyedropperContext = null;
  let eyedropperActive = false;
  let eyedropperModalWasOpen = false;

  function sampleCanvasColor(clientX, clientY) {
    const canvas = decorateCanvas;
    const rect = canvas.getBoundingClientRect();
    if (!rect.width || !rect.height) return null;
    const x = Math.floor((clientX - rect.left) * (canvas.width / rect.width));
    const y = Math.floor((clientY - rect.top) * (canvas.height / rect.height));
    if (x < 0 || y < 0 || x >= canvas.width || y >= canvas.height) return null;
    const [r, g, b, a] = canvas.getContext('2d').getImageData(x, y, 1, 1).data;
    if (a === 0) return null;
    return '#' + [r, g, b].map((v) => v.toString(16).padStart(2, '0')).join('');
  }

  function applyToolbarColor(toolbarEl, getStyle, setStyle, color) {
    const next = { ...getStyle(), color: normalizeHexColor(color) };
    setStyle(next);
    syncTextStyleToolbarUI(toolbarEl, next);
    return next;
  }

  function applyToolbarBgColor(toolbarEl, getStyle, setStyle, color) {
    const next = { ...getStyle(), bgColor: hexToBgRgba(color) };
    setStyle(next);
    syncTextStyleToolbarUI(toolbarEl, next);
    return next;
  }

  function applyToolbarBgPreset(toolbarEl, getStyle, setStyle, bgColor) {
    const next = { ...getStyle(), bgColor: normalizeBgColor(bgColor) };
    setStyle(next);
    syncTextStyleToolbarUI(toolbarEl, next);
    return next;
  }

  function endCanvasEyedropper(color) {
    const decorateWrap = $('#decorate-wrap');
    const eyedropperHint = $('#eyedropper-hint');
    decorateWrap.classList.remove('eyedropper-mode');
    eyedropperHint.hidden = true;
    eyedropperActive = false;

    if (color && eyedropperContext) {
      const { getStyle, setStyle, toolbarEl, target } = eyedropperContext;
      if (target === 'bg') {
        applyToolbarBgColor(toolbarEl, getStyle, setStyle, color);
      } else {
        applyToolbarColor(toolbarEl, getStyle, setStyle, color);
      }
    }

    if (eyedropperModalWasOpen) {
      textModal.classList.add('open');
      applyPreviewInputStyle(textStyleDraft);
    }

    eyedropperContext = null;
    eyedropperModalWasOpen = false;
    document.querySelectorAll('[data-eyedropper], [data-bg-eyedropper]').forEach((btn) => btn.classList.remove('active'));
  }

  async function startEyedropper(getStyle, setStyle, toolbarEl, target = 'color') {
    eyedropperContext = { getStyle, setStyle, toolbarEl, target };
    const pickerBtn = toolbarEl.querySelector(target === 'bg' ? '[data-bg-eyedropper]' : '[data-eyedropper]');
    pickerBtn?.classList.add('active');

    if (window.EyeDropper) {
      try {
        const result = await new EyeDropper().open();
        if (target === 'bg') {
          applyToolbarBgColor(toolbarEl, getStyle, setStyle, result.sRGBHex);
        } else {
          applyToolbarColor(toolbarEl, getStyle, setStyle, result.sRGBHex);
        }
        eyedropperContext = null;
        pickerBtn?.classList.remove('active');
        return;
      } catch (err) {
        if (err && err.name === 'AbortError') {
          eyedropperContext = null;
          pickerBtn?.classList.remove('active');
          return;
        }
      }
    }

    eyedropperActive = true;
    eyedropperModalWasOpen = textModal.classList.contains('open');
    if (eyedropperModalWasOpen) textModal.classList.remove('open');
    $('#decorate-wrap').classList.add('eyedropper-mode');
    $('#eyedropper-hint').hidden = false;
  }

  function createTextStyleToolbarHTML() {
    const swatches = TEXT_COLORS.map((c) =>
      `<button type="button" class="color-swatch" data-color="${c.value}" data-color-id="${c.id}" style="background:${c.value};${c.id === 'white' ? 'box-shadow:inset 0 0 0 1px rgba(0,0,0,0.12)' : ''}" title="${c.id}"></button>`
    ).join('');

    const bgSwatches = TEXT_BG_COLORS.map((c) =>
      `<button type="button" class="color-swatch" data-bg-color="${c.value}" data-bg-id="${c.id}" style="background:${c.value};${c.id === 'white' ? 'box-shadow:inset 0 0 0 1px rgba(0,0,0,0.12)' : ''}" title="${c.id}"></button>`
    ).join('');

    const fonts = Object.entries(TEXT_FONTS).map(([key, f]) =>
      `<button type="button" class="font-btn font-btn-${key}" data-font="${key}">${f.label}</button>`
    ).join('');

    return `
      <div class="style-row">
        <span class="style-label">Color</span>
        <div class="color-swatches">
          ${swatches}
          <button type="button" class="color-swatch color-swatch-custom" data-custom-color title="Custom color">
            <span class="color-swatch-plus">+</span>
          </button>
          <input type="color" class="color-input-hidden" data-color-input value="#ffffff" tabindex="-1" aria-hidden="true">
          <button type="button" class="color-tool-btn eyedropper-btn" data-eyedropper title="Pick from photo">${EYEDROPPER_ICON}</button>
        </div>
      </div>
      <div class="style-row">
        <span class="style-label">Font</span>
        ${fonts}
      </div>
      <div class="style-row">
        <span class="style-label">Bg</span>
        <div class="color-swatches">
          <button type="button" class="color-swatch color-swatch-none" data-bg-none title="No background"></button>
          ${bgSwatches}
          <button type="button" class="color-swatch color-swatch-custom" data-custom-bg-color title="Custom background">
            <span class="color-swatch-plus">+</span>
          </button>
          <input type="color" class="color-input-hidden" data-bg-color-input value="#1a1a1a" tabindex="-1" aria-hidden="true">
          <button type="button" class="color-tool-btn eyedropper-btn" data-bg-eyedropper title="Pick background from photo">${EYEDROPPER_ICON}</button>
        </div>
      </div>
    `;
  }

  function syncTextStyleToolbarUI(toolbarEl, style) {
    if (!toolbarEl) return;
    const color = normalizeHexColor(style.color);
    const isCustomColor = !isPresetTextColor(color);
    const bgColor = normalizeBgColor(style.bgColor);
    const isCustomBg = bgColor && !isPresetBgColor(bgColor);

    toolbarEl.querySelectorAll('.color-swatch[data-color]').forEach((btn) => {
      btn.classList.toggle('active', normalizeHexColor(btn.dataset.color) === color);
    });

    const customColorBtn = toolbarEl.querySelector('[data-custom-color]');
    if (customColorBtn) {
      customColorBtn.classList.toggle('active', isCustomColor);
      customColorBtn.style.background = isCustomColor ? color : '';
    }

    const colorInput = toolbarEl.querySelector('[data-color-input]');
    if (colorInput) colorInput.value = color;

    toolbarEl.querySelectorAll('.font-btn').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.font === style.fontKey);
    });

    const noneBgBtn = toolbarEl.querySelector('[data-bg-none]');
    if (noneBgBtn) noneBgBtn.classList.toggle('active', !bgColor);

    toolbarEl.querySelectorAll('.color-swatch[data-bg-color]').forEach((btn) => {
      btn.classList.toggle('active', bgColor === btn.dataset.bgColor);
    });

    const customBgBtn = toolbarEl.querySelector('[data-custom-bg-color]');
    if (customBgBtn) {
      customBgBtn.classList.toggle('active', !!isCustomBg);
      customBgBtn.style.background = isCustomBg ? bgColor : '';
    }

    const bgColorInput = toolbarEl.querySelector('[data-bg-color-input]');
    if (bgColorInput) bgColorInput.value = bgColor ? rgbaToHex(bgColor) : '#1a1a1a';
  }

  function applyPreviewInputStyle(style) {
    const input = $('#text-input');
    const font = TEXT_FONTS[style.fontKey] || TEXT_FONTS.serif;
    const bgColor = normalizeBgColor(style.bgColor);
    input.style.fontFamily = font.cssFamily;
    input.style.color = style.color;
    input.style.background = bgColor || 'transparent';
    input.style.borderRadius = bgColor ? '999px' : '8px';
  }

  function applyTextOverlayStyle(overlay) {
    const label = overlay.el.querySelector('.text-label');
    if (!label) return;
    const font = TEXT_FONTS[overlay.fontKey] || TEXT_FONTS.serif;
    const bgColor = normalizeBgColor(overlay.bgColor);
    label.style.fontFamily = font.cssFamily;
    label.style.fontSize = (overlay.fontSize || 24) + 'px';
    label.style.color = overlay.color || DEFAULT_TEXT_STYLE.color;
    label.style.background = bgColor || 'transparent';
    overlay.w = overlay.el.offsetWidth;
    overlay.h = overlay.el.offsetHeight;
  }

  function bindTextStyleToolbar(toolbarEl, getStyle, setStyle) {
    toolbarEl.innerHTML = createTextStyleToolbarHTML();
    const colorInput = toolbarEl.querySelector('[data-color-input]');
    const bgColorInput = toolbarEl.querySelector('[data-bg-color-input]');

    colorInput.addEventListener('input', () => {
      applyToolbarColor(toolbarEl, getStyle, setStyle, colorInput.value);
    });

    bgColorInput.addEventListener('input', () => {
      applyToolbarBgColor(toolbarEl, getStyle, setStyle, bgColorInput.value);
    });

    toolbarEl.addEventListener('click', (e) => {
      const swatch = e.target.closest('.color-swatch[data-color]');
      if (swatch) {
        applyToolbarColor(toolbarEl, getStyle, setStyle, swatch.dataset.color);
        return;
      }
      if (e.target.closest('[data-custom-color]')) {
        colorInput.value = normalizeHexColor(getStyle().color);
        colorInput.click();
        return;
      }
      if (e.target.closest('[data-eyedropper]')) {
        startEyedropper(getStyle, setStyle, toolbarEl, 'color');
        return;
      }
      const fontBtn = e.target.closest('.font-btn');
      if (fontBtn) {
        const next = { ...getStyle(), fontKey: fontBtn.dataset.font };
        setStyle(next);
        syncTextStyleToolbarUI(toolbarEl, next);
        return;
      }
      if (e.target.closest('[data-bg-none]')) {
        applyToolbarBgPreset(toolbarEl, getStyle, setStyle, null);
        return;
      }
      const bgSwatch = e.target.closest('.color-swatch[data-bg-color]');
      if (bgSwatch) {
        applyToolbarBgPreset(toolbarEl, getStyle, setStyle, bgSwatch.dataset.bgColor);
        return;
      }
      if (e.target.closest('[data-custom-bg-color]')) {
        const curBg = normalizeBgColor(getStyle().bgColor);

  let longPressTimer = null;
  const TAP_MOVE_THRESHOLD = 8;

  function bindOverlayEvents(el, overlay) {
    const deleteBtn = el.querySelector('.delete-btn');
    const resizeHandle = el.querySelector('.resize-handle');
    const rotateHandle = el.querySelector('.rotate-handle');

    deleteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeOverlay(overlay);
    });

    function onStart(e) {
      if (e.target.closest('.delete-btn, .resize-handle, .rotate-handle')) return;
      e.stopPropagation();
      selectOverlay(overlay);
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      overlayDrag = {
        overlay, startX: cx, startY: cy,
        origX: overlay.x, origY: overlay.y,
        mode: 'move', hasMoved: false, didLongPress: false,
      };

      longPressTimer = setTimeout(() => {
        if (!overlayDrag || overlayDrag.overlay !== overlay) return;
        overlayDrag.didLongPress = true;
        overlay.el.classList.add('show-delete');
      }, 500);
    }

    resizeHandle.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      selectOverlay(overlay);
      const cx = e.clientX;
      const cy = e.clientY;
      overlayDrag = { overlay, startX: cx, startY: cy, origW: overlay.w, origH: overlay.h, origFont: overlay.fontSize || 24, mode: 'resize' };
    });

    resizeHandle.addEventListener('touchstart', (e) => {
      e.stopPropagation();
      selectOverlay(overlay);
      const cx = e.touches[0].clientX;
      const cy = e.touches[0].clientY;
      overlayDrag = { overlay, startX: cx, startY: cy, origW: overlay.w, origH: overlay.h, origFont: overlay.fontSize || 24, mode: 'resize' };
    }, { passive: true });

    function startRotate(e) {
      e.stopPropagation();
      selectOverlay(overlay);
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const rect = el.getBoundingClientRect();
      const cx0 = rect.left + rect.width / 2;
      const cy0 = rect.top + rect.height / 2;
      overlayDrag = {
        overlay, mode: 'rotate',
        centerX: cx0, centerY: cy0,
        startAngle: Math.atan2(cy - cy0, cx - cx0),
        origRotation: overlay.rotation || 0,
      };
    }

    rotateHandle.addEventListener('mousedown', startRotate);
    rotateHandle.addEventListener('touchstart', startRotate, { passive: true });

    el.addEventListener('mousedown', onStart);
    el.addEventListener('touchstart', onStart, { passive: true });
  }

  function applyOverlayMove(overlayDrag, cx, cy) {
    const { overlay, mode, startX, startY, origX, origY, origW, origH, origFont, centerX, centerY, startAngle, origRotation } = overlayDrag;

    if (mode === 'move') {
      const dx = cx - startX;
      const dy = cy - startY;
      if (!overlayDrag.hasMoved) {
        if (Math.hypot(dx, dy) < TAP_MOVE_THRESHOLD) return;
        overlayDrag.hasMoved = true;
      }
      overlay.x = origX + dx;
      overlay.y = origY + dy;
      overlay.el.style.left = overlay.x + 'px';
      overlay.el.style.top = overlay.y + 'px';
    } else if (mode === 'rotate') {
      const angle = Math.atan2(cy - centerY, cx - centerX);
      overlay.rotation = origRotation + (angle - startAngle) * (180 / Math.PI);
      overlay.el.style.transform = `rotate(${overlay.rotation}deg)`;
    } else {
      const delta = Math.max(cx - startX, cy - startY);
      if (overlay.type === 'text') {
        overlay.fontSize = Math.max(12, origFont + delta * 0.3);
        applyTextOverlayStyle(overlay);
      } else {
        overlay.w = Math.max(30, origW + delta);
        overlay.h = Math.max(30, origH + delta);
        overlay.el.style.width = overlay.w + 'px';
        overlay.el.style.height = overlay.h + 'px';
      }
    }
  }

  function endOverlayDrag() {
    clearTimeout(longPressTimer);
    if (!overlayDrag) return;

    const { overlay, mode, hasMoved, didLongPress } = overlayDrag;
    if (overlay.type === 'text' && mode === 'move' && !hasMoved && !didLongPress) {
      openTextModal(overlay);
    }

    overlayDrag = null;
  }

  document.addEventListener('mousemove', (e) => {

  document.addEventListener('touchmove', (e) => {

    clearTimeout(longPressTimer);
    applyOverlayMove(overlayDrag, e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
