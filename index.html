  /* ============================================================
     FLATTEN FINAL & EXPORT — 1080×1920 branded story graphic
     ============================================================ */
  const EXPORT_SIZE = { W: 1080, H: 1920 };
  const EXPORT_BG_PATH = 'assets/jm-bg.png';
  const EXPORT_BG_OVERLAY = 'rgba(0, 0, 0, 0.2)';
  const EXPORT_CARD_SHADOW = { color: 'rgba(0, 0, 0, 0.25)', blur: 60, offsetY: 20 };
  let exportBgImage = null;

  function loadExportImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error(`Failed to load image: ${src}`));
      img.src = src;
    });
  }

  async function getExportBgImage() {
    if (exportBgImage) return exportBgImage;
    exportBgImage = await loadExportImage(EXPORT_BG_PATH);
    return exportBgImage;
  }

  function drawCoverImage(ctx, img, w, h) {
    const imgAspect = img.width / img.height;
    const canvasAspect = w / h;
    let dw, dh, dx, dy;
    if (imgAspect > canvasAspect) {
      dh = h;
      dw = h * imgAspect;
      dx = (w - dw) / 2;
      dy = 0;
    } else {
      dw = w;
      dh = w / imgAspect;
      dx = 0;
      dy = (h - dh) / 2;
    }
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  function drawExportTitle(ctx, exportW) {
    const y = 168;
    const fontSize = 58;
    ctx.save();
    ctx.font = `500 ${fontSize}px "Instrument Serif", Georgia, serif`;
    ctx.fillStyle = '#1a1a1a';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if ('letterSpacing' in ctx) ctx.letterSpacing = `${Math.round(fontSize * 0.35)}px`;
    ctx.fillText('JIGSAW MAKER', exportW / 2, y);
    ctx.restore();
  }

  function drawExportCredit(ctx, exportW, exportH) {
    const y = exportH - 88;
    const fontSize = 34;
    ctx.save();
    ctx.font = `400 ${fontSize}px "Instrument Serif", Georgia, serif`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0, 0, 0, 0.25)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 1;
    ctx.fillText('By Nasha.vibes', exportW / 2, y);
    ctx.restore();
  }

  function getExportCardRect(exportW, exportH) {
    const titleBlock = 300;
    const footerBlock = 150;
    const cardW = Math.min(820, exportW - 120);
    const cardH = Math.round(cardW * (4 / 3));
    const remainingH = exportH - titleBlock - footerBlock;
    const cardX = Math.round((exportW - cardW) / 2);
    const cardY = Math.round(titleBlock + (remainingH - cardH) * 0.58);
    const radius = Math.round(14 * (cardW / PUZZLE_WIDTH));
    return { x: cardX, y: cardY, w: cardW, h: cardH, radius };
  }

  function drawExportBgOverlay(ctx, w, h) {
    ctx.save();
    ctx.fillStyle = EXPORT_BG_OVERLAY;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
  }

  function drawExportCardShadow(ctx, card) {
    ctx.save();
    ctx.shadowColor = EXPORT_CARD_SHADOW.color;
    ctx.shadowBlur = EXPORT_CARD_SHADOW.blur;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = EXPORT_CARD_SHADOW.offsetY;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.roundRect(card.x, card.y, card.w, card.h, card.radius);
    ctx.fill();
    ctx.restore();
  }

  function drawExportPuzzleCard(ctx, assembled, card) {
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(card.x, card.y, card.w, card.h, card.radius);
    ctx.clip();
    ctx.drawImage(assembled, card.x, card.y, card.w, card.h);
    ctx.restore();

    ctx.save();
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.12)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(card.x, card.y, card.w, card.h, card.radius);
    ctx.stroke();
    ctx.restore();
  }

  async function ensureStickerImagesReady() {
    await Promise.all(state.overlays.map((overlay) => {
      if (overlay.type !== 'sticker') return Promise.resolve();
      const img = overlay.el.querySelector('img');
      if (!img) return Promise.resolve();
      if (img.complete && img.naturalWidth) return Promise.resolve();
      return new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve;
      });
    }));
  }

  function drawExportOverlays(ctx, card, layerW, layerH) {
    if (!layerW || !layerH) return;
    const scaleX = card.w / layerW;
    const scaleY = card.h / layerH;

    for (const overlay of state.overlays) {
      const x = card.x + overlay.x * scaleX;
      const y = card.y + overlay.y * scaleY;

      ctx.save();
      if (overlay.rotation) {
        const cx = x + (overlay.w * scaleX) / 2;
        const cy = y + (overlay.h * scaleY) / 2;
        ctx.translate(cx, cy);
        ctx.rotate((overlay.rotation * Math.PI) / 180);
        ctx.translate(-cx, -cy);
      }

      if (overlay.type === 'sticker') {
        const img = overlay.el.querySelector('img');
        if (img && img.complete && img.naturalWidth) {
          ctx.drawImage(img, x, y, overlay.w * scaleX, overlay.h * scaleY);
        }
      } else {
        const fs = (overlay.fontSize || 24) * scaleX;
        const fontFamily = getFontFamily(overlay.fontKey);
        const color = overlay.color || DEFAULT_TEXT_STYLE.color;
        const padX = fs * 0.42;
        const padY = fs * 0.28;
        ctx.font = `${fs}px ${fontFamily}`;
        const textW = ctx.measureText(overlay.text).width;
        const boxW = textW + padX * 2;
        const boxH = fs * 1.2 + padY * 2;

        const bgColor = normalizeBgColor(overlay.bgColor);
        if (bgColor) {
          ctx.fillStyle = bgColor;
          ctx.beginPath();
          ctx.roundRect(x, y, boxW, boxH, boxH / 2);
          ctx.fill();
        }

        ctx.fillStyle = color;
        ctx.textBaseline = 'alphabetic';
        ctx.fillText(overlay.text, x + padX, y + padY + fs * 0.88);
      }
      ctx.restore();
    }
  }

  async function renderStoryExport() {
    await document.fonts.ready;
    const bg = await getExportBgImage();
    const assembled = state.assembledCanvas || flattenPuzzle();
    const layer = $('#overlay-layer');
    const layerW = layer.clientWidth || assembled.width;
    const layerH = layer.clientHeight || assembled.height;

    await ensureStickerImagesReady();

    const { W, H } = EXPORT_SIZE;
    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    drawCoverImage(ctx, bg, W, H);
    drawExportBgOverlay(ctx, W, H);
    drawExportTitle(ctx, W);

    const card = getExportCardRect(W, H);
    drawExportCardShadow(ctx, card);
    drawExportPuzzleCard(ctx, assembled, card);
    drawExportOverlays(ctx, card, layerW, layerH);
    drawExportCredit(ctx, W, H);

    return canvas;
  }

  async function flattenFinal() {
    return renderStoryExport();
  }

  function isMobileDevice() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  function canShareFiles() {
    if (!navigator.share || !navigator.canShare) return false;
    try {
      const probe = new File([''], 'probe.jpg', { type: 'image/jpeg' });
      return navigator.canShare({ files: [probe] });
    } catch {
      return false;
    }
  }

  async function getShareBlob() {
    const canvas = await flattenFinal();
    return new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.92));
  }

  function blobToShareFile(blob) {
    return new File([blob], 'jigsaw-maker-story.jpg', { type: 'image/jpeg' });
  }

  function downloadBlob(blob, filename = 'jigsaw-maker-story.jpg') {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  const shareSheet = $('#share-sheet');
  const shareSheetBackdrop = $('#share-sheet-backdrop');
  const shareHint = $('#share-hint');
  const shareIgBtn = $('#share-ig-story');
  const shareMoreBtn = $('#share-more');
  const shareSaveSheetBtn = $('#share-save-sheet');

  let shareExportPromise = null;

  function invalidateShareExport() {
    shareExportPromise = null;
  }

  function setShareHint(message, tone = '') {
    shareHint.textContent = message || '';
    shareHint.classList.remove('is-error', 'is-success');
    if (tone) shareHint.classList.add(tone);
  }

  function updateShareSheetAvailability() {
    const fileShareOk = canShareFiles();
    const secure = window.isSecureContext;
    shareMoreBtn.hidden = !fileShareOk;
    shareMoreBtn.disabled = !fileShareOk;

    if (!secure) {
      setShareHint('Sharing needs a secure connection. Open via http://127.0.0.1:8767 on your phone, not as a downloaded file.');
      shareIgBtn.disabled = false;
      return;
    }

    if (fileShareOk && isMobileDevice()) {
      setShareHint('Tip: choose Instagram, then tap Story in the next screen.');
    } else if (fileShareOk) {
      setShareHint('On desktop, pick an app from the share menu or save the image first.');
    } else {
      setShareHint('Your browser cannot share files directly. Save the image, then upload it in Instagram → Story.');
    }
  }

  async function ensureShareExport() {
    if (!shareExportPromise) {
      shareExportPromise = getShareBlob();
    }
    return shareExportPromise;
  }

  function openShareSheet() {
    trackEvent('share_clicked');
    closeSheet();
    closeTextModal();
    deselectAllOverlays();
    invalidateShareExport();
    updateShareSheetAvailability();
    shareSheet.classList.add('open');
    shareSheetBackdrop.classList.add('open');
    shareIgBtn.disabled = true;
    shareSaveSheetBtn.disabled = true;
    setShareHint('Preparing your story image…');

    ensureShareExport()
      .then(() => {
        shareIgBtn.disabled = false;
        shareSaveSheetBtn.disabled = false;
        updateShareSheetAvailability();
      })
      .catch(() => {
        setShareHint('Could not prepare the image. Please try again.', 'is-error');
      });
  }

  function closeShareSheet() {
    shareSheet.classList.remove('open');
    shareSheetBackdrop.classList.remove('open');
  }

  async function shareViaNative(file, { text } = {}) {
    if (!canShareFiles()) return false;
    await navigator.share({
      files: [file],
      title: 'Jigsaw Maker',
      text: text || '',
    });
    return true;
  }

  async function shareToInstagramStory() {
    try {
      const blob = await ensureShareExport();
      const file = blobToShareFile(blob);

      if (canShareFiles()) {
        await shareViaNative(file, {
          text: isMobileDevice() ? 'Add to your Instagram Story' : '',
        });
        closeShareSheet();
        return;
      }

      downloadBlob(blob);
      setShareHint(
        isMobileDevice()
          ? 'Image saved. Open Instagram → + → Story → pick this image from your gallery.'
          : 'Image saved. Open Instagram on your phone and add it to your Story.',
        'is-success'
      );
    } catch (err) {
      if (err?.name === 'AbortError') return;
      setShareHint('Could not share. Try Save image, then upload in Instagram.', 'is-error');
    }
  }

  async function shareToMoreApps() {
    try {
      const blob = await ensureShareExport();
      const file = blobToShareFile(blob);
      await shareViaNative(file);
      closeShareSheet();
    } catch (err) {
      if (err?.name === 'AbortError') return;
      setShareHint('Share was blocked. Try Save image instead.', 'is-error');
    }
  }

  async function saveShareImage() {
    try {
      const blob = await ensureShareExport();
      downloadBlob(blob);
      trackEvent('image_saved');
      setShareHint('Image saved to your device.', 'is-success');
      closeShareSheet();
    } catch {
      setShareHint('Could not save the image. Please try again.', 'is-error');
    }
  }

  $('#btn-share').addEventListener('click', openShareSheet);
  $('#share-cancel').addEventListener('click', closeShareSheet);
  shareSheetBackdrop.addEventListener('click', closeShareSheet);
  shareIgBtn.addEventListener('click', shareToInstagramStory);
  shareMoreBtn.addEventListener('click', shareToMoreApps);
  shareSaveSheetBtn.addEventListener('click', saveShareImage);

  $('#btn-save-image').addEventListener('click', async () => {
    try {
      const blob = await getShareBlob();
      downloadBlob(blob);
      trackEvent('image_saved');
    } catch {
      setShareHint('Could not save the image. Please try again.', 'is-error');
    }
  });

  /* ============================================================
     RESIZE HANDLER
     ============================================================ */
  window.addEventListener('resize', () => {
    if (state.screen === 'play' && state.image) {
      initPuzzle({ preserveProgress: true });
    }
  });

  /* ============================================================
     DEV: expose generator for standalone testing
     ============================================================ */
  window.HeadbreakerGen = HeadbreakerGen;
  window.renderStoryExport = renderStoryExport;
  </script>
</body>
</html>
